# ============================================
# ZENTRALE ENV-VARIABLEN
# ============================================
x-common-env: &common-env
  NODE_ENV: ${NODE_ENV:-development}
  TZ: Europe/Berlin

x-backend-env: &backend-env
  <<: *common-env
  DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/dresden_titans}
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_KEY: ${SUPABASE_KEY:-}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
  CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
  CLOUDFLARE_R2_ACCESS_KEY: ${CLOUDFLARE_R2_ACCESS_KEY:-}
  CLOUDFLARE_R2_SECRET_KEY: ${CLOUDFLARE_R2_SECRET_KEY:-}
  CLOUDFLARE_R2_BUCKET: ${CLOUDFLARE_R2_BUCKET:-}
  JWT_SECRET: ${JWT_SECRET:-dev-secret-key}

x-frontend-env: &frontend-env
  <<: *common-env
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
  NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}

# ============================================
# SERVICES
# ============================================
services:
  # ==========================================
  # POSTGRES (Development)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: dt-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dresden_titans}
      TZ: Europe/Berlin
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net
    profiles:
      - development
      - full

  # ==========================================
  # BACKEND (Development mit Hot-Reload)
  # ==========================================
  backend-dev:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      target: development
    image: dresden-titans/backend:dev
    container_name: dt-backend-dev
    ports:
      - "${BACKEND_PORT:-3000}:3000"
      - "9229:9229"
    environment:
      <<: *backend-env
      NODE_ENV: development
    env_file:
      - .env
    volumes:
      - ./apps/backend/src:/app/apps/backend/src:cached
      - ./apps/backend/prisma:/app/apps/backend/prisma:cached
      - ./apps/backend/test:/app/apps/backend/test:cached
      - ./packages/database/src:/app/packages/database/src:cached
      - ./packages/database/prisma:/app/packages/database/prisma:cached
      - ./packages/utils/src:/app/packages/utils/src:cached
      - ./packages/types/src:/app/packages/types/src:cached
    # FINALE LÖSUNG: pnpm --filter exec vom Root!
    command: pnpm --filter @dresden-titans/backend exec nest start --debug --watch
    networks:
      - app-net
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - development

  # ==========================================
  # FRONTEND (Development mit Hot-Reload)
  # ==========================================
  frontend-dev:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
      target: development
    image: dresden-titans/frontend:dev
    container_name: dt-frontend-dev
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      <<: *frontend-env
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    env_file:
      - .env
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src:cached
      - ./apps/frontend/public:/app/apps/frontend/public:cached
      - ./packages/ui/src:/app/packages/ui/src:cached
      - ./packages/utils/src:/app/packages/utils/src:cached
      - ./packages/types/src:/app/packages/types/src:cached
    # FINALE LÖSUNG: pnpm --filter exec vom Root!
    command: pnpm --filter @dresden-titans/frontend exec next dev --port 3000
    networks:
      - app-net
    depends_on:
      - backend-dev
    profiles:
      - development

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:

# ============================================
# NETZWERKE
# ============================================
networks:
  app-net:
    driver: bridge
