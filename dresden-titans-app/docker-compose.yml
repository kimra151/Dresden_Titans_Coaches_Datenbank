version: '3.8'

services:
  # Deine Next.js App (Frontend & Backend in einem)
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:titans123@db:5432/titans_db?schema=public
    depends_on:
      - db

  # Deine Datenbank
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: titans123
      POSTGRES_DB: titans_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: